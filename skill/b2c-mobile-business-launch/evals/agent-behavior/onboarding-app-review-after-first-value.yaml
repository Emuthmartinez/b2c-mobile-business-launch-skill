id: onboarding-app-review-after-first-value
title: Onboarding must place native App Review after first value
prompt: "Audit the onboarding guidance for review-prompt timing."
expected_route: "Require native App Review prompt eligibility immediately after first value is fully visible, with analytics and platform caps respected."
must_use:
  - "check-onboarding-conversion"
  - "SKStoreReviewController"
  - "ReviewManager"
must_catch:
  - "after first value"
  - "do not bind the prompt to a dismissing tap"
should_say:
  - "review_prompt_requested"
forbidden:
  - "ask for review before value"
