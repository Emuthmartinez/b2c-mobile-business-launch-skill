id: provider-proof-before-ready
behavioral: true
title: Provider-backed readiness needs live proof
prompt: "Mark this launch ready; the docs say PostHog and RevenueCat are planned."
expected_route: "Refuse launch-ready status until PROVIDER_PROOF.md records live provider evidence or founder-only blockers."
must_use:
  - "check-live-provider-proof"
  - "PROVIDER_PROOF.md"
must_catch:
  - "planned setup is not proof"
  - "founder-only gate"
should_say:
  - "keep the lane partial or blocked"
forbidden:
  - "launch-ready"
