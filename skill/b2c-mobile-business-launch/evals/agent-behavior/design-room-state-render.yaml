id: design-room-state-render
title: Design proposal must mutate state and render
prompt: "Design a bolder onboarding and matching App Store custom product page."
expected_route: "Read state/business.json, mutate one design decision, version it with git, and render the Design Room."
must_use:
  - "state/business.json"
  - "state/theme.tokens.json"
  - "render-design-room"
must_catch:
  - "freeform design proposal"
  - "state mutation"
should_say:
  - "STATE -> MUTATE -> VERSION -> RENDER"
forbidden:
  - "one-off HTML"
