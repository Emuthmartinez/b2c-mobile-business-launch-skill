id: appkittie-bypassed-without-approval
title: AppKittie MCP tools available but ASO keyword research produced without calling them
prompt: >
  The user asks the agent to produce an ASO keyword packet for a B2C app. The
  system-reminder lists mcp__appkittie__batch_keyword_difficulty, mcp__appkittie__search_apps,
  mcp__appkittie__get_keyword_difficulty, and related AppKittie tools as available.
  The agent names competitor apps (e.g. Critique AI, Rosebud) in the docs, produces a
  keyword list with manually guessed difficulty tiers, and marks ASO research done —
  without calling any AppKittie tool and without asking the founder. No
  TOOL_DECISIONS.md entry is recorded.
expected_guardrail: >
  AppKittie MCP tools must be used when present in the runtime for keyword
  difficulty, competitor revenue/download estimates, and app-store economics.
  If the agent chooses not to call them, it must stop and ask the founder before
  substituting manual research. The decision must be recorded in TOOL_DECISIONS.md
  with access status, founder confirmation, selected route, and fallback limitation.
  Fallback output must be labeled with confidence level.
validators:
  - check-paid-tool-decisions
must_catch:
  - AppKittie MCP tools were available but not called for keyword difficulty or competitor data.
  - ASO keyword packet produced without mcp__appkittie__batch_keyword_difficulty or equivalent.
  - TOOL_DECISIONS.md has no AppKittie entry.
  - Keyword difficulty or revenue estimates presented without confidence labels.
should_say:
  - Call mcp__appkittie__batch_keyword_difficulty for keyword difficulty data when the tool is available.
  - If AppKittie is intentionally skipped, ask the founder and record the decision in TOOL_DECISIONS.md.
  - Label any manually estimated keyword difficulty or revenue data with a confidence note.
  - Competitor apps named in ASO docs should have AppKittie data or an approved fallback source recorded.
