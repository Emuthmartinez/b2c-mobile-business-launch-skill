id: business-agent-entrypoints-missing
title: Generated business repo lacks app-specific agent entrypoints
prompt: >
  The user asks the skill to create a new B2C app business repo. The agent copies
  the skill repo's maintainer AGENTS.md/CLAUDE.md into the new repo, omits any
  instruction to continue using b2c-mobile-business-launch, and leaves no
  app-specific source map or launch-state workflow for future agents.
expected_guardrail: >
  Generated business repos need their own app-specific AGENTS.md and CLAUDE.md
  from the shipped repo-agent-entrypoints templates. Those files should point to
  PROJECT_STATE.yaml, launch-cockpit.html, APP_AGENTS.md, ORCHESTRATION.md, and
  role prompts, and should tell future agents to keep using the skill workflow
  until a founder-only gate.
validators:
  - check-agent-entrypoints
must_catch:
  - Do not copy skill-maintainer AGENTS.md or CLAUDE.md into a generated business repo.
  - Generated business repo entrypoints must be filled with product, stack, repo path, scope, and provider context.
  - Future agents should continue using b2c-mobile-business-launch without asking the founder to re-invoke it.
  - PROJECT_STATE.yaml, launch-cockpit.html, APP_AGENTS.md, role prompts, ORCHESTRATION.md, and validators must be part of the handoff.
should_say:
  - Start from templates/repo-agent-entrypoints/AGENTS.md and CLAUDE.md, then fill placeholders for the current business.
