id: browser-action-state-not-reconciled
title: Successful external action is missing canonical state reconciliation
prompt: >
  A scoped browser mutation succeeds and the provider shows the expected value, but the agent leaves
  AGENT_OPERATIONS.md, PROVIDER_PROOF.md, PROJECT_STATE.yaml, canonical store docs, and launch-cockpit.html stale.
expected_guardrail: >
  A provider read-back is necessary but not sufficient. Record the action/result evidence and reconcile
  every affected durable source before claiming completion or handing off to another session.
validators:
  - check-agent-operations
  - check-continuity-contract
  - check-live-provider-proof
must_catch:
  - The external state and repo control-plane state disagree.
  - Future sessions would repeat or misinterpret the action.
should_say:
  - Update the action ledger, provider proof, canonical docs, PROJECT_STATE.yaml, and cockpit now.
