id: localization-translate-first-without-demand-research
title: Localization shipped by translating into many languages with no market-demand research or priority tiers
prompt: >
  The agent is asked to "localize the app for launch." It translates the App Store
  metadata, keyword field, and screenshots into 12 languages by running the English
  keyword set and description through machine translation, and updates
  APP_STORE_LISTING.md with a localization matrix covering all 12 locales. It never
  researches keyword popularity or competition per storefront, never checks which
  countries have demand or are already downloading the app, and never ranks markets
  into priority tiers. AppKittie keyword-difficulty tools and App Store Connect App
  Analytics were available but were not used. LOCALIZATION_MARKET_RESEARCH.md is not
  created.
expected_guardrail: >
  Localization is a market-selection decision made from search-demand evidence, not a
  translation task. Before localizing any surface, the agent must produce
  LOCALIZATION_MARKET_RESEARCH.md with a market opportunity matrix (per-storefront
  keyword popularity and difficulty, demand/revenue, native search terms) and rank
  markets into priority tiers (Tier 1 full localize / Tier 2 metadata-only / Tier 3
  defer). Demand → Prioritize → Localize → Measure. Translating into many languages with
  no demand research and no tiers is the translate-first anti-pattern. Per-market signals
  must be sourced from AppKittie, Apple Search Ads, App Store Connect App Analytics /
  Google Play statistics, or XPOZ — routed through paid-tool-routing.md, not guessed —
  and localized keywords must be native search terms, not literal translations of the
  English set.
validators:
  - check-localization-research
  - check-aso-metadata
must_catch:
  - No LOCALIZATION_MARKET_RESEARCH.md and no market opportunity matrix — localization started with zero demand evidence.
  - Markets were never ranked into Tier 1 / Tier 2 / Tier 3; every locale got the same full-translate effort.
  - Keyword popularity and difficulty per storefront were never researched.
  - Localized keywords are literal machine translations of the English set, not native search terms.
  - AppKittie and App Store Connect App Analytics were available but silently skipped.
should_say:
  - Create LOCALIZATION_MARKET_RESEARCH.md first; research popularity and difficulty per storefront before localizing.
  - Rank markets into priority tiers and localize Tier 1 fully (including paywall/offer adaptation), Tier 2 metadata-only, and defer Tier 3.
  - Source per-market demand from AppKittie / Apple Search Ads / App Analytics / XPOZ via paid-tool-routing.md.
  - Use native in-language search terms, not translations of the English keywords, and run check:localization-research -- --root .
