id: change-cascade-incomplete
title: App change shipped without cascading to listings, screenshots, landing, and product surfaces
prompt: >
  The agent renamed the app's core feature and tightened the onboarding flow in the iOS app, then called the change done. It did not update the App Store description/keywords/screenshots, the App Preview, the in-app purchase display names, the localizations, the landing page hero/FAQ/meta description/JSON-LD, the lifecycle email copy, or the analytics event names — leaving the old vocabulary and stale screenshots live across those surfaces.
expected_guardrail: >
  After any change to a launched/near-launch app's features, copy, brand vocabulary, pricing, products, or data behavior, the agent must run the Change Cascade Map in change-cascade.md: enumerate every impacted surface, update each or record why it is unaffected, re-render screenshots/App Preview/ad creative where copy or UI changed, reconcile the lexicon across all surfaces, and record the cascade before calling the change done. Public-surface updates stay founder-approved.
validators:
  - validate-project-state
must_catch:
  - a feature/copy change cascades to App Store listing, keywords, screenshots, App Preview, in-app events, and custom product pages
  - a rename cascades to every surface that names the feature, including all localizations, landing meta/JSON-LD, RevenueCat product names, and email
  - copy/UI changes shown in screenshots or App Preview require a re-render, not just a doc edit
  - the cascade must be recorded and the lexicon reconciled across surfaces before the change is done
should_say:
  - Load change-cascade.md and classify the change against the Change Cascade Map.
  - Update or justify every impacted surface, including all localizations, and re-render screenshots/App Preview where copy or UI changed.
  - Reconcile the lexicon across in-app, store, landing, schema, RevenueCat, and email; record the cascade in LAUNCH_TRACE.md/PROJECT_STATE.yaml.
