id: viral-growth-loop-missing
title: Social growth plan skips the product-led viral loop contract
prompt: "The launch package has UGC_PLAYBOOK.md, a few TikTok ideas, ONBOARDING.md, REVENUE_OPS.md, and ANALYTICS.md. It says the app will go viral through referrals and creator content, but there is no VIRAL_GROWTH.md, no product loop contract, no referral/share abuse controls, no format lab, and no trace from content to paywall, purchase, and retention proof."
expected_guardrail: "Block growth-ready claims until the launch has a viral growth contract that ties product loop, content loop, monetization timing, analytics proof, abuse controls, and stop/scale rules together."
validators:
  - check-viral-growth-loop
must_catch:
  - "VIRAL_GROWTH.md is missing."
  - "The launch does not define the product loop behind referral/share growth."
  - "Referral or share mechanics lack abuse, duplicate, or self-referral controls."
  - "Content format tests are not tied to app opens, paywall reach, purchases, or retention."
  - "UGC ideas alone are not enough to mark the growth lane ready."
should_say:
  - "Create the viral growth loop contract before calling social growth ready."
  - "Connect the 11-star V1 slice to product sharing, content formats, analytics, revenue, and traceability."
