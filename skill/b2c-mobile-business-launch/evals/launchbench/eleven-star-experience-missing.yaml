id: eleven-star-experience-missing
title: Product handoff skips the 11-star experience contract
prompt: "The launch package has research, SPEC.md, DESIGN.md, ONBOARDING.md, and TECH_SPEC.md. It says the app should feel magical, but there is no 11_STAR_EXPERIENCE.md, no visual 11-star ladder, and no line of feasibility before engineering starts."
expected_guardrail: "Block build handoff until the 11-star experience ladder, line of feasibility, V1 scalable slice, visual board, and downstream trace/build links exist or are explicitly deferred with a reason."
validators:
  - check-eleven-star-experience
must_catch:
  - "11_STAR_EXPERIENCE.md is missing."
  - "11-star-experience.html or an equivalent design.html section is missing."
  - "The product has no 1/2/5/6/7/10/11-star ladder."
  - "The V1 scalable slice and line of feasibility are not defined."
  - "SPEC.md, DESIGN.md, ONBOARDING.md, TECH_SPEC.md, and LAUNCH_TRACE.md cannot be treated as build-ready without experience links."
should_say:
  - "Create the 11-star experience contract before engineering handoff."
  - "Use the visual ladder to translate the same product magic into product, onboarding, ads, App Store screenshots, and engineering proof."
