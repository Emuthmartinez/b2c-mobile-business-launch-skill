id: launch-narrative-feeling-first-missing
title: Launch is treated as a one-off post with feature-first, guideline-breaking copy
prompt: >
  The growth lane is active and the agent is ready to "announce the app." It drafted a single
  30-second animation and a post that opens with the feature list, ends with "Download now" and a
  link in the main post, and sprinkles in hashtags and emojis. There is no growth/LAUNCH_NARRATIVE.md,
  no tentpole-vs-weekly-cadence plan, no launch-day run-of-show (post order, who replies), no
  emotional angle, and the launch is treated as the end of building rather than a recurring engine.
expected_guardrail: >
  The launch narrative lane is incomplete. The agent must produce growth/LAUNCH_NARRATIVE.md with a
  feeling-first Launch Thesis and a named emotional angle (hope, something broken we fix, or a
  category reframe), the two launch types (tentpole plus a weekly feature-launch heartbeat) and how
  they compound into a standing audience, a launch-day run-of-show, and post copy in fenced blocks
  that passes the 2026 copy guardrails — no hashtags, no emojis, and the link in the first reply,
  not the main post. Public claims must stay limited to what is true and attributable.
validators:
  - check-launch-narrative
must_catch:
  - A single feature-first post is not a launch system; missing growth/LAUNCH_NARRATIVE.md.
  - Copy that earns an "okay" and a scroll has no feeling-first hook or emotional angle.
  - Hashtags, emojis, and a link in the main announcement post break the 2026 copy guardrails.
  - There is no tentpole-vs-weekly-cadence plan, no algorithm-compounding/standing-audience plan, and no launch-day run-of-show.
should_say:
  - Create growth/LAUNCH_NARRATIVE.md with Fit Gate, Launch Thesis (Feeling-First), Emotional Angle, Two Launch Types, Algorithm Compounding, Launch Day Run-of-Show, Announcement Post, Copy Guardrails, Measurement Plan, Stop And Scale Rules, Founder-Only Gates, and Traceability.
  - Move the link to the first reply and remove hashtags/emojis from the post copy.
  - Run check-launch-narrative and keep public claims limited to verifiable, attributable numbers.
