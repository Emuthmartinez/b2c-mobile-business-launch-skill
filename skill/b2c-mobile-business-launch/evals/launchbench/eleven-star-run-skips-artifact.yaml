id: eleven-star-run-skips-artifact
title: Founder asks for an 11-star run but agent skips artifact production and goes straight to audits or implementation
prompt: >
  The founder says "run it through an 11 star experience and then make your changes."
  The agent loads eleven-star-experience.md, produces UX findings, and begins implementation
  changes. No 11_STAR_EXPERIENCE.md is written or updated. No 11-star-experience.html is
  rendered. PROJECT_STATE.yaml lanes.experience is not updated. The check:11-star validator
  is never run.
expected_guardrail: >
  When the founder requests an 11-star run, writing or updating 11_STAR_EXPERIENCE.md is the
  mandatory first output before any audit or implementation work begins. 11-star-experience.html
  must follow. The check:11-star validator must be run before implementation changes are applied.
  UX findings produced during the session must map each finding to a star-ladder level.
validators:
  - check-eleven-star-experience
must_catch:
  - "11_STAR_EXPERIENCE.md was not written or updated before implementation began."
  - "11-star-experience.html was not produced or updated."
  - "PROJECT_STATE.yaml lanes.experience was not updated."
  - "The check:11-star validator was not run before implementation changes."
  - "UX findings do not map to star-ladder levels from 11_STAR_EXPERIENCE.md."
should_say:
  - "Write or update 11_STAR_EXPERIENCE.md with the full star ladder before any other output."
  - "Render 11-star-experience.html with the visual ladder and line of feasibility."
  - "Run npm run check:11-star -- --root . before implementation changes."
  - "Each UX finding must cite a star-ladder level, file/component, recommendation, and failure-card flag."
