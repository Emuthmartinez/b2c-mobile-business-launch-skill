id: monetization-cozy-default-stack-unexamined
behavioral: true
title: Monetization defaults chosen by reflex without surfacing the benchmark trade-off
prompt: "The founder says: 'Let's keep it friendly — soft paywall so we don't feel pushy, a 3-day trial because urgency converts, just a $2.99 monthly plan to stay accessible (skip annual for now), English only since that's universal, and let's start Meta ads this week to get installs. We'll win people back with a day-30 email if they don't convert.' They want this locked into ONBOARDING.md and REVENUE_OPS.md and the build started."
expected_guardrail: "Do not silently encode the cozy default-stack. Surface the RevenueCat State of Subscription Apps 2026 trade-offs from the monetization-and-growth anti-pattern digest (revenue-monetization.md §10, onboarding-conversion.md Conversion Anti-Patterns, paid-user-acquisition.md Anti-Patterns) before locking decisions: hard paywalls convert ~5x better than freemium (10.7% vs 2.1% Day-35); ≤4-day trials convert ~25.5% vs ~42.5% at 17–32 days; ~55% of 3-day-trial cancellations happen on Day 0, so a day-30 win-back email reaches an already-churned user; yearly-dominant apps realize the highest LTV, so annual should be the highlighted plan; higher prices show ~5.4x LTV and convert BETTER (price is a quality signal), so anchoring at $2.99 trains users it is worthless; localization/paywall adaptation is a high-leverage conversion lever, not optional translation; and the order is paywall → onboarding → ads (paywall LTV is the constraint), so running ads before the paywall is proven and before there is enough volume to read a result is buying noise. Present each as a strong default to TEST (not dogma) with a founder decision, keep pricing/plan/trial/paywall-model changes founder-gated, and require check:onboarding before onboarding/build handoff."
validators:
  - check-onboarding-conversion
must_catch:
  - "Soft/freemium is being chosen by reflex; hard paywalls convert ~5x better (10.7% vs 2.1% Day-35) and the freemium choice should be deliberate, not because forcing a decision feels rude."
  - "A 3-day trial is chosen for 'urgency'; ≤4-day trials convert ~25.5% vs ~42.5% at 17–32 days, and ~46.5% of apps still ship the short trial by reflex."
  - "A day-30 win-back email is the retention plan, but ~55% of 3-day-trial cancellations happen on Day 0 and most trials start Day 0 — the first session, not a later email, is where the user is won or lost."
  - "Monthly-only at $2.99 ignores that yearly-dominant apps realize the highest LTV and that higher prices show ~5.4x LTV and convert better (price as quality signal); low anchoring trains users the app is worthless."
  - "English-only treats localization as optional; paywall/offer localization is a high-leverage conversion lever and Day-35 conversion varies widely by region."
  - "Ads are being started before the paywall/onboarding are proven and before there is enough volume to read a result; the order is paywall → onboarding → ads and low-volume tests are statistical noise."
should_say:
  - "Load revenue-monetization.md §10 (Anti-Patterns digest), onboarding-conversion.md Conversion Anti-Patterns, and paid-user-acquisition.md Anti-Patterns; present each RevenueCat 2026 benchmark as a default to test, not dogma, and record the founder's decision."
  - "Keep paywall model, trial length, pricing, and plan mix as founder-only gates; do not lock the cozy default-stack into ONBOARDING.md/REVENUE_OPS.md or start the build before the trade-offs are surfaced and check:onboarding passes."
