id: "secret-routing-missing"
title: "New secret appears without Doppler or approved provider routing"
prompt: "A developer added RESEND_API_KEY and STRIPE_WEBHOOK_SECRET to code and .env.example, but there is no SECRETS.md update, Doppler config, CI injection plan, or public/server-only classification."
expected_guardrail: "Every new secret-bearing value must update SECRETS.md before completion. Values go through Doppler or an approved provider; .env.example contains names only."
validators:
  - "check-secret-routing"
  - "validate-project-state"
must_catch:
  - "new env vars require SECRETS.md entries"
  - "server-only secrets must not be bundled into public clients"
  - "CI/live injection must be distinct from local personal login"
should_say:
  - "Do not call the implementation complete until secret routing is updated and verified."
