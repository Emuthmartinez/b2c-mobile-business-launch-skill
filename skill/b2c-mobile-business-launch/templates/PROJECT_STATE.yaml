schema_version: "1"
updated_at: "2026-05-27"
project:
  name: "App Name"
  slug: "app-name"
  owner: "Founder or team"
  phase: "phase_0_orient"
  platforms:
    - ios
  bundle_ids:
    ios: "com.example.app"
    android: ""
  public_urls:
    landing: ""
    privacy: ""
    terms: ""
  source_truth:
    transcript: ""
    repo: ""
    current_docs:
      - "SPEC.md"
autonomy:
  mode: "prepare"
  last_founder_approval: ""
  founder_only_gates:
    - "paid tool signups or spend"
    - "credentials, secrets, and account access"
    - "App Store or Google Play submission"
    - "public posting or scheduling"
orchestration:
  preflight_done: false
  strategy: "inline"
  rationale: "No parallel work has been evaluated yet."
  integration_owner: "orchestrator"
  manager_pattern: true
  file_overlap_checked: false
  actual_file_collision_check: false
  agent_outputs_reviewed: false
  state_reconciled: false
  candidate_units: []
  parallel_safe_units: []
  serialized_units:
    - "PROJECT_STATE.yaml updates"
    - "launch-cockpit.html rendering"
    - "git staging, commits, merges, pushes, and releases"
    - "provider/account mutations"
    - "MobAI or simulator/device control"
  spawned_agents: []
  focused_validators_run: []
  full_suites_run: []
compound_engineering:
  availability: "unknown"
  route: "not_evaluated"
  latest_check:
    status: "not_checked"
    checked_at: ""
    installed_version: ""
    latest_version: ""
    source: ""
  skills_considered: []
  brainstorm_status: "not_evaluated"
  plan_status: "not_evaluated"
  work_status: "not_evaluated"
  worktree_status: "not_evaluated"
  review_status: "not_evaluated"
  test_status: "not_evaluated"
  proof_status: "not_evaluated"
  fallback_reason: ""
lanes:
  paid_tool_routing:
    status: "partial"
    evidence:
      - "TOOL_DECISIONS.md"
    blockers: []
  secrets:
    status: "partial"
    evidence:
      - "SECRETS.md"
    blockers: []
  security:
    status: "partial"
    evidence:
      - "SECURITY.md"
      - "security-review.html"
    blockers: []
  research:
    status: "partial"
    evidence:
      - "RESEARCH.md"
    blockers: []
  traceability:
    status: "partial"
    evidence:
      - "LAUNCH_TRACE.md"
    blockers: []
  experience:
    status: "partial"
    evidence:
      - "11-star-experience/11_STAR_EXPERIENCE.md"
      - "11-star-experience/11-star-experience.html"
    blockers: []
  product:
    status: "partial"
    evidence:
      - "SPEC.md"
    blockers: []
  design:
    status: "partial"
    evidence:
      - "DESIGN.md"
      - "screen-design/design.md"
      - "UX_PATTERNS.md"
      - "design.html"
      - "ux-patterns.html"
    blockers: []
  content_assets:
    status: "partial"
    evidence:
      - "content-assets/CONTENT_ASSETS.md"
      - "content-assets/content-assets.html"
      - "content-assets/manifest.json"
    blockers: []
  analytics_attribution:
    status: "partial"
    evidence:
      - "ANALYTICS.md"
      - "analytics-plan.html"
    blockers: []
    attribution_contract:
      screen_early: false
      stable_source_keys:
        - "friend"
        - "x_twitter"
        - "tiktok"
        - "instagram"
        - "youtube"
        - "app_store_search"
        - "google_play_search"
        - "creator"
        - "ai_search"
        - "other"
      other_free_text: false
      event_name: "attribution_source_selected"
      person_properties:
        - "self_reported_source"
        - "self_reported_source_label"
      backend_persistence: false
      anonymous_reconciliation: false
      verified: false
  paid_user_acquisition:
    status: "partial"
    evidence:
      - "growth/PAID_UA.md"
      - "growth/paid-ua-report.csv"
    blockers:
      - "Founder approval is required before ad account connection, paid spend, budget changes, or live campaign launch."
  onboarding:
    status: "partial"
    evidence:
