      - "orchestration/orchestration.html"
    blockers: []
  engineering:
    status: "partial"
    evidence:
      - "TECH_SPEC.md"
      - "ENGINEERING_PLAN.md"
      - "PRODUCTION_READINESS.md"
    blockers: []
  growth:
    status: "partial"
    evidence:
      - "growth/VIRAL_GROWTH.md"
      - "growth/format-lab.csv"
      - "UGC_PLAYBOOK.md"
      - "FASTLANE_OPS.md"
    blockers: []
tools:
  doppler:
    route: "intended_paid_or_account_tool"
    docs_checked_at: ""
    cli_version: ""
    required_secrets:
      - "DOPPLER_TOKEN"
    preflight: "Confirm project/config naming before creating service tokens."
    validation: "doppler run -- printenv APP_ENV"
    fallback: "Apple Keychain, platform secrets, or names-only .env after founder approval."
  posthog:
    route: "intended_account_tool"
    docs_checked_at: ""
    required_secrets:
      - "POSTHOG_PROJECT_API_KEY"
      - "POSTHOG_PERSONAL_API_KEY"
    preflight: "Confirm product analytics region, replay/survey posture, and privacy disclosures."
    validation: "Verify event plus person property in PostHog."
    fallback: "Local event log or open-source analytics only after founder approval."
  refero:
    route: "optional_paid_or_account_tool"
    docs_checked_at: ""
    required_secrets:
      - "REFERO_API_TOKEN"
    preflight: "Confirm Refero Pro access, OAuth or bearer-token route, query budget, and whether fallback UX pattern pack is founder-approved."
    validation: "UX_PATTERNS.md records selected styles/screens/flows or approved fallback; ux-patterns.html renders pattern inventory and state matrix."
    fallback: "Bundled templates/ux-patterns pattern pack, founder-provided references, or public UX libraries only after founder approval."
  revenuecat:
    route: "intended_account_tool"
    docs_checked_at: ""
    required_secrets:
      - "REVENUECAT_PUBLIC_IOS_KEY"
      - "REVENUECAT_SECRET_API_KEY"
      - "REVENUECAT_WEBHOOK_SECRET"
    preflight: "Confirm entitlement, offering, store products, and sandbox account."
    validation: "Sandbox purchase grants entitlement in app and backend/profile."
    fallback: "StoreKit/TestFlight sandbox notes only after founder approval."
  paid_ad_channels:
    route: "optional_paid_or_account_tool"
    docs_checked_at: ""
    required_secrets: []
    preflight: "Use paid-user-acquisition.md before spend. Confirm one-channel choice, target event, baseline, creative cadence, tracking stack, RevenueCat LTV/CPA source, store destination, privacy/ATT implications, and founder-approved budget."
    validation: "PAID_UA.md, growth/paid-ua-report.csv, ANALYTICS.md, REVENUE_OPS.md, CONTENT_ASSETS.md, and LAUNCH_TRACE.md show channel decision, blended report, RevenueCat economics, creative proof, and stop/scale rules."
    fallback: "Use organic, ASO, waitlist, or manual spreadsheet planning only after paid spend or ad-account access is blocked, deferred, or not needed."
  stripe:
    route: "optional_account_tool"
    docs_checked_at: ""
    required_secrets:
      - "STRIPE_SECRET_KEY"
      - "STRIPE_WEBHOOK_SECRET"
    preflight: "Confirm whether web checkout or web funnels are in scope."
    validation: "Checkout or webhook event projects entitlement correctly."
    fallback: "Defer web checkout and use app-store purchase only after founder approval."
  resend:
    route: "intended_account_tool"
    docs_checked_at: ""
    required_secrets:
      - "RESEND_API_KEY"
      - "RESEND_WEBHOOK_SECRET"
    preflight: "Confirm sender domain, reply-to, unsubscribe, and support aliases."
    validation: "Send test email and verify webhook or provider log."
    fallback: "Cloudflare routing plus manual Gmail responses after founder approval."
  sentry:
    route: "optional_account_tool"
    docs_checked_at: ""
    required_secrets:
      - "SENTRY_DSN"
      - "SENTRY_AUTH_TOKEN"
    preflight: "Confirm crash/performance scope and PII scrubbing."
    validation: "Known non-production test event reaches Sentry."
    fallback: "Store crash reports and local logs after founder approval."
  security_review:
    route: "optional_paid_or_account_tool"
    docs_checked_at: ""
    required_secrets: []
    preflight: "Confirm whether Claude Security, Codex Security, GitHub Advanced Security, Snyk/Semgrep/Socket, MobSF Cloud, or a free local route is approved before running scans."
    validation: "SECURITY.md, security-review.html, LaunchBench, and security validator evidence show threat model, platform hardening, supply-chain checks, and release proof."
    fallback: "Use local security skills, OWASP MASVS/ASVS, MobSF local, gitleaks/trufflehog, npm audit/osv-scanner, semgrep community rules, Xcode/Android static checks only after founder approval when replacing paid tools."
  app_store_connect:
    route: "intended_account_tool"
    docs_checked_at: ""
    required_secrets:
      - "ASC_KEY_ID"
      - "ASC_ISSUER_ID"
      - "ASC_PRIVATE_KEY_PATH"
    preflight: "Use app-store-connect-cli.md first (ASC Auth Setup And Recovery). Check for an existing keychain profile (asc --profile <Name>) before claiming no ASC access; one account-level API key reaches every app on the team. Confirm Apple Developer membership, Team ID, bundle ID, app name, SKU, locale, ASC CLI/skill-pack auth, and founder approval before app-record mutation."
    validation: "ASC CLI/skill route records app creation/app record state, IDs, metadata, screenshots, TestFlight, review status, RevenueCat catalog reconciliation, and archive/export/upload path."
    fallback: "Manual ASC click-path packet only after CLI/auth/account/skill-route blocker or founder-approved non-CLI route is recorded."
  aso_skills:
    route: "optional_local_skill_pack"
    docs_checked_at: ""
    required_secrets: []
    preflight: "Refresh the Eronred ASO skill pack or installed local equivalents before ASO, icon, screenshot, CPP, event, paid UA, or post-launch metric guidance."
    validation: "APP_STORE_LISTING.md, SCREENSHOTS.md, and STORE_CONSOLE.md record which ASO specialist lanes were used or intentionally not needed."
    fallback: "Apply equivalent frameworks manually only after paid/account-gated ASO routes and missing runtime access are recorded."
  app_store_screenshots:
    route: "optional_local_skill_pack"
    docs_checked_at: ""
    required_secrets: []
    selected_route: "ParthJadhav/app-store-screenshots | equivalent local export board | blocked"
    preflight: "Refresh ParthJadhav/app-store-screenshots, confirm real UI captures, app icon, design tokens, 11-star slice, locales/themes, iPhone/iPad support, and whether Higgsfield/Remotion supporting assets need approval."
    board_path: "screenshots/index.html or generated app-store-screenshots workspace"
    state_path: "app-store-screenshots.json"
    source_inputs:
      - "screenshots/raw/"
      - "app-icon/app-icon-1024.png"
      - "DESIGN.md"
      - "design.md"
      - "11_STAR_EXPERIENCE.md"
      - "APP_STORE_LISTING.md"
      - "CONTENT_ASSETS.md when Higgsfield/Remotion/supporting art is used"
    output_dirs:
      - "screenshots/final/en-US/iphone-69/"
      - "screenshots/final/en-US/ipad-13/"
    validation: "SCREENSHOTS.md records exact iPhone/iPad wells, required/scaled decisions, screenshot count, dimensions, alpha/sRGB proof, asc-shots-pipeline dry-run, and upload status."
    upload_status: "not_started | dry_run_ready | uploaded | blocked"
    fallback: "Use Remotion, HTML/CSS composition, or designer-owned files only after the app-store-screenshots route is unavailable or not fit and the limitation is recorded."
  higgsfield:
    route: "optional_paid_or_account_tool"
    docs_checked_at: ""
    required_secrets: []
    preflight: "Confirm DESIGN.md tokens, asset family, prompt brief, source rights, and whether the output is screenshot support, App Icon, CPP/event art, preview thumbnail, or UGC/ad creative."
    validation: "CONTENT_ASSETS.md and SCREENSHOTS.md record route, prompt summary, source inputs, output paths, visual QA, and founder approval gates."
    fallback: "Remotion, HTML/CSS composition, founder-owned media, public-domain assets, or raw screenshots only after founder approval and limitation notes."
    identity:
      # Trained-once Soul/presenter identity, reused across ads, UGC, and presenter video.
      # Run show_characters before training to avoid duplicate runs. See tool-recipes.md "Soul-Once Founder-Face Ads".
      soul_reference_id: ""
      soul_variant: ""
      avatar_id: ""
      training_date: ""
      photos_source: ""
      training_manifest_path: ""
  mobai:
    route: "intended_paid_or_account_tool"
    docs_checked_at: ""
    required_secrets: []
    preflight: "Confirm device/app access, bundle/package ID, locale, seeded demo state, and screenshot-critical flows before capture."
    validation: "SCREENSHOTS.md records raw capture paths, device/locale, source screen, version localization ID, and final composition linkage."
    fallback: "XcodeBuildMCP for Apple-only capture or founder-provided captures only after paid-tool fallback approval and limitations are recorded."
  google_play:
    route: "intended_account_tool"
    docs_checked_at: ""
    required_secrets:
      - "GOOGLE_PLAY_SERVICE_ACCOUNT_JSON"
    preflight: "Confirm developer account, package name, app content declarations, data safety, and tester track."
    validation: "Internal testing release or blocked reason recorded."
    fallback: "Manual Play Console packet after founder approval."
  cloudflare:
    route: "optional_account_tool"
    docs_checked_at: ""
    required_secrets:
      - "CLOUDFLARE_API_TOKEN"
    preflight: "Confirm domain, DNS, email routing, Pages/Workers, and secrets."
    validation: "HTTPS, DNS, headers, routes, and email aliases verified."
    fallback: "Existing registrar/host after founder approval."
  remotion:
    route: "optional_local_render_tool"
    docs_checked_at: ""
    required_secrets: []
    license_status: "Check current Remotion license before commercial use; record eligibility or founder approval."
    preflight: "Confirm Higgsfield fallback approval if applicable, source asset rights, real app UI inputs, target surfaces, and whether a launch-local content-assets/remotion project is needed."
    validation: "CONTENT_ASSETS.md, content-assets.html, manifest.json, render command proof, source inputs, and output paths are recorded; representative still or render is checked before public use."
    fallback: "Use Higgsfield, raw screenshots, founder-owned media, local recordings, HTML/CSS/SVG/canvas, or public-domain assets only after the route is approved and limitations are recorded."
proof:
  launch_cockpit: "launch-cockpit.html"
  launchbench:
    last_run: ""
    scenarios_passed: []
    scenarios_failed: []
  commands:
    - command: ""
      expected: ""
      actual: ""
      evidence: ""
open_questions:
  - owner: "founder"
    question: "What decisions still require founder approval?"
    blocks:
      - "store submission"
failure_cards:
  active:
    - id: "doppler-docs-stale"
      severity: "medium"
      owner: "orchestrator"
      status: "open"
      next_action: "Refresh official docs and local CLI help before writing setup commands."
  resolved: []
