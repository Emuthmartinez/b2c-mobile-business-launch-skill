    blockers: []
  store_console:
    status: "partial"
    evidence:
      - "STORE_CONSOLE.md"
      - "store-console.html"
      - "APP_STORE_LISTING.md"
      - "app-store-listing.html"
      - "app-privacy-questionnaire.html"
