name: Skill Source Freshness

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "23 11 * * 1"
  workflow_dispatch:

# Default to read-only; the weekly refresh job re-grants write scopes it needs.
permissions:
  contents: read

jobs:
  audit:
    if: github.event_name != 'schedule' && github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 (v4.3.1)
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm ci --prefix skill/b2c-mobile-business-launch
      - run: npm run audit:ci
      - run: npm pack --dry-run --json

  weekly-source-refresh:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 (v4.3.1)
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm ci --prefix skill/b2c-mobile-business-launch
      - name: Refresh source registry and snapshots
        run: npm run refresh:source-freshness
      - name: Audit after refresh
        run: npm run audit:ci
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: source-freshness-report
          path: |
            docs/source-freshness/SOURCE_REFRESH_REPORT.md
            docs/source-freshness/source-refresh.html
            docs/source-freshness/source-snapshots/current.json
      # Source freshness tracks this third-party action:
      # https://github.com/peter-evans/create-pull-request
      - uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6
        with:
          branch: chore/source-freshness-refresh
          title: "Refresh skill source freshness"
          commit-message: "Refresh skill source freshness"
          body: |
            Weekly source freshness refresh.

            Review auto-discovered sources as candidates before treating them as canonical launch policy. If upstream changes affect behavior, update references/templates/validators/evals in this PR before merging.
          add-paths: |
            skill/b2c-mobile-business-launch/references/source-registry.yaml
            docs/source-freshness/
